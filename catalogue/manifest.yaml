apiVersion: v1
kind: ConfigMap
metadata:
  name: roboshop-config
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  # modify replicas according to your case
  replicas: 1
  selector:
    matchLabels:
       project: roboshop
       tier: backend
       component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: mathslogic/catalogue:4.0.0
        envFrom:
        - configMapRef:
            name: catalogue-config
      
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  selector:
    project: roboshop
    tier: backend
    component: catalogue
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080