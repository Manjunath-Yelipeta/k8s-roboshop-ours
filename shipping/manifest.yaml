apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-config
  namespace: roboshop
data:
  CART_ENDPOINT: cart:8080
  DB_HOST: mysql

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  # modify replicas according to your case
  replicas: 1
  selector:
    matchLabels:
       project: roboshop
       tier: backend
       component: shipping
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping
    spec:
      containers:
      - name: shipping
        image: mathslogic/shipping:4.0.0
        envFrom:
        - configMapRef:
            name: shipping-config
        ports:
        - name: liveness-port
          containerPort: 8080
        startupProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            failureThreshold: 12
            periodSeconds: 10
        livenessProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            periodSeconds: 10
            failureThreshold: 1
        readinessProbe:
            exec:
              command:
              - /bin/cat
              - /tmp/healthy
            periodSeconds: 5
      
---
apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  selector:
    project: roboshop
    tier: backend
    component: shipping
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080