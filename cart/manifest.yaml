apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-config
  namespace: roboshop
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
  

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  # modify replicas according to your case
  replicas: 1
  selector:
    matchLabels:
       project: roboshop
       tier: backend
       component: cart
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      containers:
      - name: cart
        image: mathslogic/cart:4.0.0
        envFrom:
        - configMapRef:
            name: cart-config
      
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    project: roboshop
    tier: backend
    component: cart
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080